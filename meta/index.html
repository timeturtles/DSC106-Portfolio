<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta</title>
    <link rel="stylesheet" href="..\style.css">
    <script src="/DSC106-Portfolio/global.js" type="module"></script>
</head>
<body>
    <h1>Meta</h1>


<div>
  <label>
    Show commits until:
    <input type="range" id="commit-progress" min="0" max="100" value="100" />
    <time id="commit-time"></time>
  </label>
</div>
 
<!-- Your existing #stats div stays here -->
<div id="stats"></div>
 
 
<!-- CHANGE 2: Wrap the scatter plot and brush-related divs in #scrolly-1 / #scatter-plot -->
<!-- Replace your existing chart section with this structure: -->
<div id="scrolly-1">
  <div id="scatter-story">
    <!-- commit step divs are generated by JS — leave empty -->
  </div>
  <div id="scatter-plot">
    <!-- Everything that was previously around #chart goes here, e.g.: -->
    <div id="chart"></div>
    <p id="selection-count"></p>
    <dl id="language-breakdown"></dl>
    <div id="commit-tooltip" hidden>
      <p><a id="commit-link" target="_blank"></a></p>
      <p id="commit-date"></p>
      <p id="commit-times"></p>
      <p id="commit-author"></p>
      <p id="commit-lines"></p>
    </div>
  </div>
</div>
 
 
<!-- CHANGE 3: Move #files to the very end of the body (after #scrolly-1) -->
<dl id="files"></dl>



    
    <script src="meta.js" type="module"></script>
</body>
</html>
